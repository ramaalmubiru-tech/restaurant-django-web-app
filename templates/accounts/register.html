{% extends 'base.html' %}
{% block content %}
<div class="container mt-5" style="max-width:400px">
    <h2 class="mb-4">Create Account</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success w-100">
            Register
        </button>
    </form>
    <p class="mt-3">Already have an account? 
        <a href="{% url 'login' %}">Login here</a>
    </p>
</div>
{% endblock %}
